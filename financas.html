<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#4f46e5"/>
<title>Finanças Pessoais</title>
<style>
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--accent:#4f46e5;--accent-light:#eef2ff;--danger:#ef4444;--success:#10b981;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);overscroll-behavior:none;padding-bottom:72px;}
input,select,button,textarea{font-family:inherit;}
.hidden{display:none!important;}
button{cursor:pointer;}

/* header */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
#header .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;color:var(--accent);}

/* bottom nav */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06);}
#bnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 0 5px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:500;}
#bnav button.active{color:var(--accent);font-weight:700;}
#bnav button .icon{font-size:18px;line-height:1;}
#bnav button .dot{width:16px;height:3px;background:var(--accent);border-radius:99px;margin-top:1px;}

/* main */
#main{max-width:680px;margin:0 auto;padding:20px 16px;}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;padding:12px 24px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;}
.btn-success{background:#10b981;color:#fff;}
.btn-sm{padding:8px 16px;font-size:12px;}
.btn-ghost{background:transparent;border:1px solid var(--accent);color:var(--accent);}
.btn-ghost-muted{background:transparent;border:1px solid var(--muted);color:var(--muted);}
.btn-ghost-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn-full{width:100%;}
.btn-danger-soft{background:#fee2e2;border:1px solid #fca5a5;color:var(--danger);}

/* inputs */
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;}
.inp:focus{border-color:var(--accent);}
.field{margin-bottom:14px;}
.field label{display:block;color:var(--muted);font-size:11px;font-weight:700;margin-bottom:5px;letter-spacing:.8px;text-transform:uppercase;}

/* badge */
.badge{display:inline-flex;align-items:center;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700;white-space:nowrap;}

/* progress bar */
.bar-wrap{background:#e2e8f0;border-radius:99px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;}
.modal-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.15);}
.modal-wide{max-width:700px;}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0;}
.modal-head h3{margin:0;font-size:17px;font-weight:700;}
.modal-head .close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:4px;line-height:1;}
.modal-body{padding:24px;}

/* toggle */
.toggle-group{display:flex;gap:8px;}
.toggle-btn{flex:1;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 4px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.toggle-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* gradient cards */
.grad-card{border-radius:20px;padding:22px;color:#fff;position:relative;overflow:hidden;}
.grad-card .circle{position:absolute;top:-28px;right:-28px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.1);}

/* login */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;padding:24px;}
#login-box{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
#login-box .logo-big{text-align:center;margin-bottom:28px;}
#login-box .logo-big .emoji{font-size:52px;display:block;margin-bottom:10px;}
#login-box .logo-big h1{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;}
#login-box .logo-big p{color:var(--muted);font-size:14px;}

/* pie */
.pie-legend{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.pie-legend-item{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.pie-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

/* calculator */
.calc{background:var(--surface);border-radius:16px;padding:16px;border:1px solid var(--border);}
.calc-display{background:var(--bg);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:20px;font-weight:700;text-align:right;min-height:44px;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
.calc-btn{padding:14px 0;border-radius:10px;border:none;cursor:pointer;font-size:16px;font-weight:700;}
.calc-btn.op{background:var(--accent);color:#fff;}
.calc-btn.eq{background:var(--accent);color:#fff;}
.calc-btn.ok{background:#10b981;color:#fff;}
.calc-btn.cl{background:#fee2e2;color:var(--danger);}
.calc-btn.bk{background:#fef3c7;color:#92400e;}
.calc-btn.num{background:var(--bg);color:var(--text);}

/* info box */
.info-box{background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:14px;margin-bottom:16px;font-size:13px;color:#92400e;}

/* stat mini */
.stat-mini{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;}

/* clickable row */
.row-click{cursor:pointer;}
.row-click:active{opacity:.7;}

@media print{#bnav,#header{display:none!important;} body{padding-bottom:0;}}
</style>
</head>
<body>

<div id="login-screen">
  <div id="login-box">
    <div class="logo-big">
      <span class="emoji">💰</span>
      <h1>Finanças Pessoais</h1>
      <p id="login-subtitle">Bem-vinda de volta!</p>
    </div>
    <div id="login-form">
      <div id="setup-fields" class="hidden">
        <div class="field"><label>Criar senha</label><input class="inp" id="inp-new-pass" type="password" placeholder="Mínimo 4 caracteres"/></div>
        <div class="field"><label>Confirmar senha</label><input class="inp" id="inp-confirm-pass" type="password" placeholder="Repita a senha"/></div>
      </div>
      <div id="login-fields">
        <div class="field"><label>Senha</label><input class="inp" id="inp-pass" type="password" placeholder="Digite sua senha"/></div>
      </div>
      <p id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;text-align:center;display:none;"></p>
      <button class="btn btn-primary btn-full" id="btn-login">🔓 Entrar</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="header">
    <div class="logo"><span>💰</span><span>Finanças</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-primary btn-sm" id="btn-new-expense">＋ Gasto</button>
      <button style="background:none;border:none;font-size:20px;" id="btn-logout">🔒</button>
    </div>
  </div>

  <div id="main">
    <div id="tab-dashboard"></div>
    <div id="tab-expenses" class="hidden"></div>
    <div id="tab-categories" class="hidden"></div>
    <div id="tab-cards" class="hidden"></div>
    <div id="tab-boxes" class="hidden"></div>
    <div id="tab-report" class="hidden"></div>
  </div>

  <nav id="bnav">
    <button data-tab="dashboard" class="active"><span class="icon">🏠</span><span>Início</span><div class="dot"></div></button>
    <button data-tab="expenses"><span class="icon">💸</span><span>Gastos</span></button>
    <button data-tab="categories"><span class="icon">🗂️</span><span>Categorias</span></button>
    <button data-tab="cards"><span class="icon">💳</span><span>Cartões</span></button>
    <button data-tab="boxes"><span class="icon">🐷</span><span>Caixinhas</span></button>
    <button data-tab="report"><span class="icon">📄</span><span>Relatório</span></button>
  </nav>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
// ── storage ──────────────────────────────────────────────────────────────────
const LS = {
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ── helpers ──────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v??0);
const fmtDate=d=>new Date(d+"T12:00:00").toLocaleDateString("pt-BR");
const today=()=>new Date().toISOString().slice(0,10);
const monthKey=(y,m)=>`${y}-${String(m+1).padStart(2,"0")}`;
const currentMonth=()=>{const n=new Date();return monthKey(n.getFullYear(),n.getMonth());};
const el=id=>document.getElementById(id);
const h=(tag,attrs={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")e.className=v;
    else if(k==="html")e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c!=null){e.appendChild(typeof c==="string"?document.createTextNode(c):c);}});
  return e;
};

// ── data ─────────────────────────────────────────────────────────────────────
const DEFAULT_PASS="1234";
const INIT_CATS=[
  {id:"c1",name:"Alimentação",icon:"🍽️",color:"#f97316",cumulative:false,subcats:[{id:"s1",name:"Supermercado",limit:900,cumulative:false},{id:"s2",name:"Restaurantes",limit:400,cumulative:false},{id:"s3",name:"Delivery",limit:200,cumulative:false}]},
  {id:"c2",name:"Transporte",icon:"🚗",color:"#3b82f6",cumulative:false,subcats:[{id:"s4",name:"Combustível",limit:500,cumulative:false},{id:"s5",name:"Uber/99",limit:200,cumulative:false},{id:"s6",name:"Manutenção",limit:100,cumulative:true}]},
  {id:"c3",name:"Moradia",icon:"🏠",color:"#8b5cf6",cumulative:true,subcats:[{id:"s7",name:"Aluguel",limit:1500,cumulative:false},{id:"s8",name:"Contas",limit:300,cumulative:false},{id:"s9",name:"Manutenção",limit:200,cumulative:true}]},
  {id:"c4",name:"Saúde",icon:"💊",color:"#10b981",cumulative:true,subcats:[{id:"s10",name:"Plano de Saúde",limit:300,cumulative:false},{id:"s11",name:"Farmácia",limit:100,cumulative:true},{id:"s12",name:"Consultas",limit:100,cumulative:true}]},
];
const INIT_CARDS=[
  {id:"k1",name:"Nubank",flag:"Mastercard",color:"#820ad1",limit:5000,closeDay:15,dueDay:22,isDefault:true},
  {id:"k2",name:"Inter",flag:"Visa",color:"#e96e1c",limit:3000,closeDay:5,dueDay:12,isDefault:false},
];

let STATE = {
  categories: LS.get("fin:cats", INIT_CATS),
  cards: LS.get("fin:cards", INIT_CARDS),
  expenses: LS.get("fin:exps", []),
  boxes: LS.get("fin:boxes", []),
};

const save=()=>{
  LS.set("fin:cats",STATE.categories);
  LS.set("fin:cards",STATE.cards);
  LS.set("fin:exps",STATE.expenses);
  LS.set("fin:boxes",STATE.boxes);
};

// derived helpers
const catLimit=cat=>cat.subcats.reduce((a,s)=>a+(s.limit||0),0);
const subcatMap=()=>{const m={};STATE.categories.forEach(c=>c.subcats.forEach(s=>(m[s.id]={...s,cat:c})));return m;};
const defaultCard=()=>STATE.cards.find(c=>c.isDefault)||STATE.cards[0];

// expand installments per month
const allInstallments=()=>{
  const sm=subcatMap();
  const list=[];
  STATE.expenses.forEach(e=>{
    if(e.installments<=1){list.push({...e,_sm:sm});}
    else{
      const base=new Date(e.date+"T12:00:00");
      for(let i=0;i<e.installments;i++){
        const d=new Date(base);
        d.setMonth(d.getMonth()+i);
        list.push({...e,id:`${e.id}_p${i+1}`,_origId:e.id,date:d.toISOString().slice(0,10),total:parseFloat((e.total/e.installments).toFixed(2)),currentInstallment:i+1,_isInst:true,_sm:sm});
      }
    }
  });
  return list.sort((a,b)=>b.date.localeCompare(a.date));
};

const monthExps=(prefix)=>allInstallments().filter(e=>e.date.startsWith(prefix||currentMonth()));

const spendByCat=(prefix)=>{
  const m={};
  monthExps(prefix).forEach(e=>e.splits.forEach(sp=>{
    const sc=e._sm[sp.subcatId];if(!sc)return;
    if(!m[sc.cat.id])m[sc.cat.id]={total:0,bySub:{}};
    const amt=e._isInst?e.total*(sp.amount/e.splits.reduce((a,x)=>a+x.amount,0)):sp.amount;
    m[sc.cat.id].total+=amt;
    m[sc.cat.id].bySub[sp.subcatId]=(m[sc.cat.id].bySub[sp.subcatId]||0)+amt;
  }));
  return m;
};

// ── navigation ───────────────────────────────────────────────────────────────
let currentTab="dashboard";
const tabs=["dashboard","expenses","categories","cards","boxes","report"];

function switchTab(name){
  tabs.forEach(t=>{
    el(`tab-${t}`).classList.toggle("hidden",t!==name);
  });
  document.querySelectorAll("#bnav button").forEach(b=>{
    const active=b.dataset.tab===name;
    b.classList.toggle("active",active);
    const dot=b.querySelector(".dot");
    if(dot)dot.style.display=active?"block":"none";
  });
  currentTab=name;
  renderTab(name);
}

document.querySelectorAll("#bnav button").forEach(b=>{
  b.addEventListener("click",()=>switchTab(b.dataset.tab));
  const dot=b.querySelector(".dot");
  if(dot&&b.dataset.tab!=="dashboard")dot.style.display="none";
});

function renderTab(name){
  switch(name){
    case "dashboard": renderDashboard(); break;
    case "expenses": renderExpenses(); break;
    case "categories": renderCategories(); break;
    case "cards": renderCards(); break;
    case "boxes": renderBoxes(); break;
    case "report": renderReport(); break;
  }
}

// ── login ────────────────────────────────────────────────────────────────────
function initLogin(){
  const isFirst=!LS.get("fin:pass",null);
  el("login-subtitle").textContent=isFirst?"Crie sua senha de acesso":"Bem-vinda de volta!";
  el("btn-login").textContent=isFirst?"✅ Criar senha":"🔓 Entrar";
  if(isFirst){el("setup-fields").classList.remove("hidden");el("login-fields").classList.add("hidden");}

  el("btn-login").onclick=()=>{
    const err=el("login-error");
    if(isFirst){
      const np=el("inp-new-pass").value;
      const cp=el("inp-confirm-pass").value;
      if(np.length<4){err.textContent="Mínimo 4 caracteres.";err.style.display="block";return;}
      if(np!==cp){err.textContent="Senhas não coincidem.";err.style.display="block";return;}
      LS.set("fin:pass",np);
    } else {
      const p=el("inp-pass").value;
      if(p!==LS.get("fin:pass",DEFAULT_PASS)){err.textContent="Senha incorreta!";err.style.display="block";el("inp-pass").value="";return;}
    }
    sessionStorage.setItem("fin:session","1");
    el("login-screen").classList.add("hidden");
    el("app").classList.remove("hidden");
    switchTab("dashboard");
  };
  el("inp-pass").onkeydown=e=>{if(e.key==="Enter")el("btn-login").click();};
  el("inp-confirm-pass")&&(el("inp-confirm-pass").onkeydown=e=>{if(e.key==="Enter")el("btn-login").click();});
}

el("btn-logout").onclick=()=>{
  sessionStorage.removeItem("fin:session");
  location.reload();
};

// ── modal ─────────────────────────────────────────────────────────────────────
function openModal(contentFn, wide=false){
  const bg=h("div",{class:"modal-bg"});
  const box=h("div",{class:`modal-box${wide?" modal-wide":""}`});
  bg.appendChild(box);
  bg.onclick=e=>{if(e.target===bg)closeModal();};
  contentFn(box,()=>closeModal());
  el("modal-container").appendChild(bg);
  function closeModal(){bg.remove();renderTab(currentTab);}
  return closeModal;
}

function modalHead(box, title, closeFn){
  const head=h("div",{class:"modal-head"},[
    h("h3",{},[title]),
    h("button",{class:"close",onClick:closeFn},["✕"])
  ]);
  box.appendChild(head);
}

// ── bar ───────────────────────────────────────────────────────────────────────
function makeBar(value,max,color){
  const pct=max>0?Math.min((value/max)*100,100):0;
  const wrap=h("div",{class:"bar-wrap"});
  const fill=h("div",{class:"bar-fill",style:{width:`${pct}%`,background:pct>80?"var(--danger)":color}});
  wrap.appendChild(fill);
  return wrap;
}

// ── badge ────────────────────────────────────────────────────────────────────
function makeBadge(text,color){
  return h("span",{class:"badge",style:{background:color+"18",color,border:`1px solid ${color}33`}},[text]);
}

// ── pie chart ────────────────────────────────────────────────────────────────
function makePie(data){
  const total=data.reduce((a,d)=>a+d.value,0);
  if(!total||!data.length)return null;
  const size=220,cx=110,cy=110,r=80;
  const ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");
  svg.setAttribute("width",size);svg.setAttribute("height",size);
  svg.style.display="block";svg.style.margin="0 auto";
  let angle=0;
  data.forEach(d=>{
    const pct=d.value/total;
    const start=angle;
    const end=angle+pct*2*Math.PI;
    angle=end;
    const x1=cx+r*Math.cos(start-Math.PI/2),y1=cy+r*Math.sin(start-Math.PI/2);
    const x2=cx+r*Math.cos(end-Math.PI/2),y2=cy+r*Math.sin(end-Math.PI/2);
    const large=end-start>Math.PI?1:0;
    const path=document.createElementNS(ns,"path");
    path.setAttribute("d",`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`);
    path.setAttribute("fill",d.color);
    path.setAttribute("stroke","#fff");
    path.setAttribute("stroke-width","2");
    svg.appendChild(path);
  });
  const circ=document.createElementNS(ns,"circle");
  circ.setAttribute("cx",cx);circ.setAttribute("cy",cy);circ.setAttribute("r","40");
  circ.setAttribute("fill","#fff");svg.appendChild(circ);
  const t1=document.createElementNS(ns,"text");
  t1.setAttribute("x",cx);t1.setAttribute("y",cy-6);t1.setAttribute("text-anchor","middle");
  t1.setAttribute("font-size","11");t1.setAttribute("fill","#64748b");t1.textContent="Total";svg.appendChild(t1);
  const t2=document.createElementNS(ns,"text");
  t2.setAttribute("x",cx);t2.setAttribute("y",cy+10);t2.setAttribute("text-anchor","middle");
  t2.setAttribute("font-size","12");t2.setAttribute("font-weight","bold");t2.setAttribute("fill","#1e293b");
  t2.textContent=fmt(total);svg.appendChild(t2);
  const wrap=h("div",{},[svg]);
  const legend=h("div",{class:"pie-legend"});
  data.forEach(d=>{
    const pct=((d.value/total)*100).toFixed(1);
    const item=h("div",{class:"pie-legend-item"},[
      h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[
        h("div",{class:"pie-dot",style:{background:d.color}}),
        h("span",{},[`${d.icon||""} ${d.name}`])
      ]),
      h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},[
        h("span",{style:{color:"#64748b",fontSize:"11px"}},[`${pct}%`]),
        h("span",{style:{fontWeight:"700"}},[fmt(d.value)])
      ])
    ]);
    legend.appendChild(item);
  });
  wrap.appendChild(legend);
  return wrap;
}

// ── calculator ────────────────────────────────────────────────────────────────
function makeCalculator(onResult){
  let expr="";
  const div=h("div",{class:"calc"});
  const disp=h("div",{class:"calc-display"},["0"]);
  div.appendChild(disp);
  const updateDisp=()=>{disp.textContent=expr||"0";};
  const rows=[["7","8","9","÷"],["4","5","6","×"],["1","2","3","-"],["0",",","=","+"],["C","⌫","✓",""]];
  const opMap={"÷":"/","×":"*"};
  rows.forEach(row=>{
    const g=h("div",{class:"calc-grid"});
    row.forEach(k=>{
      if(!k){g.appendChild(h("div"));return;}
      let cls="calc-btn ";
      if(k==="✓")cls+="ok";
      else if(["÷","×","-","+"].includes(k))cls+="op";
      else if(k==="=")cls+="eq";
      else if(k==="C")cls+="cl";
      else if(k==="⌫")cls+="bk";
      else cls+="num";
      const btn=h("button",{class:cls,onClick:()=>{
        if(k==="C"){expr="";updateDisp();return;}
        if(k==="⌫"){expr=expr.slice(0,-1);updateDisp();return;}
        if(k==="="){
          try{const r=Function('"use strict";return ('+expr.replace(/,/g,".")+")")();expr=String(parseFloat(r.toFixed(2)));}catch{expr="Erro";}
          updateDisp();return;
        }
        if(k==="✓"){const n=parseFloat(expr.replace(/,/g,"."));if(!isNaN(n))onResult(n);return;}
        expr+=opMap[k]||k;updateDisp();
      }},[k]);
      g.appendChild(btn);
    });
    div.appendChild(g);
  });
  return div;
}

        const ei=h("div");

        ei.appendChild(h("div",{style:{fontSize:"11px",color:"var(--muted)"}},[fmtDate(e.date)+(e._isInst?` · ${e.currentInstallment}/${e.installments}x`:"")]));

        er.appendChild(h("span",{style:{fontWeight:"800",color:"var(--danger)",fontSize:"14px",marginLeft:"8px",flexShrink:"0"}},[fmt(e.total)]));

    });
  };
  selMonth.addEventListener("change",()=>{selM=+selMonth.value;renderList();});
  selYear.addEventListener("change",()=>{selY=+selYear.value;renderList();});
  renderList();
}

// ── CAIXINHAS ────────────────────────────────────────────────────────────────
function renderBoxes(){
  const tab=el("tab-boxes");tab.innerHTML="";
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}});
  hdr.appendChild(h("h2",{style:{fontSize:"20px",fontWeight:"800"}},["🐷 Caixinhas"]));
  hdr.appendChild(h("button",{class:"btn btn-primary btn-sm",id:"btn-show-add-box"},["＋ Nova"]));
  tab.appendChild(hdr);
  tab.appendChild(h("div",{class:"info-box"},["💡 Guarde dinheiro para pagar parcelas futuras. Registre quanto já guardou e o app calcula o que precisa tirar do salário."]));

  const addForm=h("div",{class:"card",style:{display:"none",marginBottom:"16px"}});
  addForm.appendChild(h("h3",{style:{fontSize:"15px",fontWeight:"700",marginBottom:"14px"}},["Nova Caixinha"]));
  const fName=h("input",{class:"inp",style:{marginBottom:"10px"},placeholder:"Nome (ex: Parcelas Mercado)"});
  const fTarget=h("input",{class:"inp",style:{marginBottom:"10px"},type:"number",placeholder:"Meta total a guardar (R$)"});
  const fInvoice=h("input",{class:"inp",style:{marginBottom:"10px"},type:"number",placeholder:"Valor da fatura deste mês (R$)"});
  const fSaved=h("input",{class:"inp",style:{marginBottom:"14px"},type:"number",placeholder:"Já guardado na caixinha (R$)"});
  const addBtns=h("div",{style:{display:"flex",gap:"8px"}});
  addBtns.appendChild(h("button",{class:"btn btn-primary btn-full",onClick:()=>{
    if(!fName.value||!fTarget.value)return;
    STATE.boxes.push({id:uid(),name:fName.value,target:parseFloat(fTarget.value)||0,invoice:parseFloat(fInvoice.value)||0,saved:parseFloat(fSaved.value)||0,entries:[]});
    save();fName.value="";fTarget.value="";fInvoice.value="";fSaved.value="";addForm.style.display="none";renderBoxes();
  }},["✅ Criar"]));
  addBtns.appendChild(h("button",{class:"btn btn-ghost-muted btn-full",onClick:()=>{addForm.style.display="none";}},["Cancelar"]));
  [fName,fTarget,fInvoice,fSaved,addBtns].forEach(e=>addForm.appendChild(e));
  tab.appendChild(addForm);

  document.getElementById("btn-show-add-box").onclick=()=>{addForm.style.display=addForm.style.display==="none"?"block":"none";};

  if(!STATE.boxes.length){tab.appendChild(h("div",{style:{textAlign:"center",padding:"40px 0",color:"var(--muted)"}},[h("div",{style:{fontSize:"40px",marginBottom:"8px"}},["🐷"]),h("div",{},["Nenhuma caixinha criada ainda"])]));return;}

  STATE.boxes.forEach(box=>{
    const pct=box.target>0?Math.min((box.saved/box.target)*100,100):0;
    const toSave=Math.max(box.target-box.saved,0);
    const toPay=Math.max((box.invoice||0)-box.saved,0);
    const card=h("div",{class:"card"});

    const topRow=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}});
    topRow.appendChild(h("div",{},[h("div",{style:{fontWeight:"700",fontSize:"16px"}},[`🐷 ${box.name}`]),h("div",{style:{fontSize:"12px",color:"var(--muted)",marginTop:"2px"}},[`Meta: ${fmt(box.target)}`])]));
    topRow.appendChild(h("button",{style:{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"18px"},onClick:()=>{if(confirm("Excluir esta caixinha?"))STATE.boxes=STATE.boxes.filter(b=>b.id!==box.id);save();renderBoxes();}},["🗑️"]));
    card.appendChild(topRow);

    const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}});
    grid.appendChild(h("div",{style:{background:"#f0fdf4",borderRadius:"12px",padding:"12px",textAlign:"center"}},[h("div",{style:{fontSize:"11px",color:"#15803d",fontWeight:"600"}},["GUARDADO"]),h("div",{style:{fontSize:"18px",fontWeight:"800",color:"#15803d"}},[fmt(box.saved)])]));
    grid.appendChild(h("div",{style:{background:"#fef3c7",borderRadius:"12px",padding:"12px",textAlign:"center"}},[h("div",{style:{fontSize:"11px",color:"#92400e",fontWeight:"600"}},["FALTA GUARDAR"]),h("div",{style:{fontSize:"18px",fontWeight:"800",color:"#92400e"}},[fmt(toSave)])]));
    card.appendChild(grid);

    if(box.invoice>0){
      const calc=h("div",{style:{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:"12px",padding:"12px",marginBottom:"14px"}});
      calc.appendChild(h("div",{style:{fontSize:"12px",color:"#1d4ed8",fontWeight:"700",marginBottom:"6px"}},["📊 Cálculo da fatura"]));
      [[`Fatura total:`,fmt(box.invoice)],[`Já guardado:`,`- ${fmt(box.saved)}`],[`Tirar do salário:`,fmt(toPay),true]].forEach(([l,v,bold])=>{
        const r=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",color:"#1e40af",padding:"2px 0",borderTop:bold?"1px solid #bfdbfe":"none"}});
        r.appendChild(h("span",{style:{fontWeight:bold?"700":"400"}},[l]));
        r.appendChild(h("span",{style:{fontWeight:bold?"800":"700",fontSize:bold?"15px":"13px",color:bold&&toPay>0?"#dc2626":"#15803d"}},[v]));
        calc.appendChild(r);
      });
      card.appendChild(calc);
    }

    card.appendChild(makeBar(box.saved,box.target,"#4f46e5"));
    card.appendChild(h("div",{style:{fontSize:"11px",color:"var(--muted)",marginTop:"4px",textAlign:"right"}},[`${pct.toFixed(0)}% da meta`]));

    // deposit
    const depBtn=h("button",{style:{background:"none",border:"none",color:"var(--accent)",fontWeight:"700",cursor:"pointer",fontSize:"13px",marginTop:"12px",display:"block"}},["＋ Registrar depósito"]);
    const depForm=h("div",{style:{display:"none",marginTop:"10px",borderTop:"1px solid var(--border)",paddingTop:"14px"}});
    const dAmt=h("input",{class:"inp",style:{marginBottom:"8px"},type:"number",placeholder:"Valor R$"});
    const dNote=h("input",{class:"inp",style:{marginBottom:"10px"},placeholder:"Observação"});
    depForm.appendChild(dAmt);depForm.appendChild(dNote);
    depForm.appendChild(h("button",{class:"btn btn-success btn-full",onClick:()=>{
      const amt=parseFloat(dAmt.value);if(!amt)return;
      const idx=STATE.boxes.findIndex(b=>b.id===box.id);
      if(idx>=0){STATE.boxes[idx].saved+=amt;STATE.boxes[idx].entries=[...STATE.boxes[idx].entries,{id:uid(),amount:amt,note:dNote.value,date:today()}];}
      save();renderBoxes();
    }},["✅ Guardar"]));

    if(box.entries?.length){
      const hist=h("div",{style:{marginTop:"12px"}});
      hist.appendChild(h("div",{style:{fontSize:"11px",color:"var(--muted)",fontWeight:"700",marginBottom:"6px"}},["HISTÓRICO"]));
      [...box.entries].reverse().slice(0,5).forEach(e=>{
        const r=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",padding:"5px 0",borderBottom:"1px solid var(--border)"}});
        r.appendChild(h("span",{style:{color:"var(--muted)"}},[`${fmtDate(e.date)}${e.note?` · ${e.note}`:""}`]));
        r.appendChild(h("span",{style:{fontWeight:"700",color:"#15803d"}},[`+${fmt(e.amount)}`]));
        hist.appendChild(r);
      });
      depForm.appendChild(hist);
    }
    card.appendChild(depBtn);card.appendChild(depForm);
    depBtn.onclick=()=>{const open=depForm.style.display!=="none";depForm.style.display=open?"none":"block";depBtn.textContent=open?"＋ Registrar depósito":"▲ Fechar";};
    tab.appendChild(card);
  });
}

// ── REPORT ───────────────────────────────────────────────────────────────────
function renderReport(){
  const tab=el("tab-report");tab.innerHTML="";
  const now=new Date();
  let selM=now.getMonth(),selY=now.getFullYear();
  const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const MONTHS_SHORT=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  tab.appendChild(h("h2",{style:{fontSize:"20px",fontWeight:"800",marginBottom:"16px"}},["Relatório"]));

  const filterRow=h("div",{style:{display:"flex",gap:"10px",marginBottom:"16px"}});
  const selMonth=h("select",{class:"inp",style:{flex:"2"}});
  MONTHS.forEach((m,i)=>{const o=h("option",{value:String(i)},[m]);if(i===selM)o.setAttribute("selected","");selMonth.appendChild(o);});
  const selYear=h("select",{class:"inp",style:{flex:"1"}});
  [2024,2025,2026,2027].forEach(y=>{const o=h("option",{value:String(y)},[String(y)]);if(y===selY)o.setAttribute("selected","");selYear.appendChild(o);});
  filterRow.appendChild(selMonth);filterRow.appendChild(selYear);
  tab.appendChild(filterRow);

  const content=h("div");tab.appendChild(content);

  const render=()=>{
    content.innerHTML="";
    const prefix=`${selY}-${String(selM+1).padStart(2,"0")}`;
    const sm=subcatMap();
    const mExp=allInstallments().filter(e=>e.date.startsWith(prefix));
    const total=mExp.reduce((a,e)=>a+e.total,0);
    const sp=spendByCat(prefix);

    // hero
    const hero=h("div",{class:"grad-card",style:{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",marginBottom:"14px"}},[
      h("div",{class:"circle"}),
      h("div",{style:{fontSize:"12px",opacity:".8"}},[`Total — ${MONTHS[selM]} ${selY}`]),
      h("div",{style:{fontSize:"28px",fontWeight:"800",margin:"4px 0 8px"}},[fmt(total)]),
      h("div",{style:{display:"flex",gap:"20px",fontSize:"12px",opacity:".8"}},[h("span",{},[`📋 ${mExp.length} lançamentos`]),h("span",{},[`🗂️ ${Object.keys(sp).length} categorias`])])
    ]);
    content.appendChild(hero);

    // pie
    const byCat=Object.values(sp).map(({total:v},_)=>v).length?
      STATE.categories.filter(c=>sp[c.id]?.total>0).map(c=>({name:c.name,icon:c.icon,value:sp[c.id].total,color:c.color})).sort((a,b)=>b.value-a.value):[];

    if(byCat.length){
      const pieCard=h("div",{class:"card",style:{marginBottom:"14px"}});
      pieCard.appendChild(h("h3",{style:{fontSize:"13px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"14px"}},["Distribuição"]));
      const pie=makePie(byCat);
      if(pie)pieCard.appendChild(pie);
      content.appendChild(pieCard);
    }

    // by category
    const catCard=h("div",{class:"card",style:{marginBottom:"14px"}});
    catCard.appendChild(h("h3",{style:{fontSize:"13px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"14px"}},["Por Categoria"]));
    if(!byCat.length)catCard.appendChild(h("p",{style:{color:"var(--muted)",textAlign:"center",padding:"16px 0"}},["Nenhum gasto neste período."]));
    byCat.forEach(d=>{
      const spSub=sp[STATE.categories.find(c=>c.name===d.name)?.id]?.bySub||{};
      const c=STATE.categories.find(x=>x.name===d.name);
      const div2=h("div",{style:{marginBottom:"16px",paddingBottom:"16px",borderBottom:"1px solid var(--border)"}});
      const r=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px",alignItems:"center"}});
      r.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[h("span",{},[d.icon]),h("span",{style:{fontWeight:"700",fontSize:"14px"}},[d.name])]));
      const pct=total>0?((d.value/total)*100).toFixed(1):0;
      const rv=h("div",{style:{textAlign:"right"}});rv.appendChild(h("span",{style:{fontWeight:"700",color:d.color,fontSize:"14px"}},[fmt(d.value)]));rv.appendChild(h("span",{style:{fontSize:"11px",color:"var(--muted)",marginLeft:"6px"}},[`${pct}%`]));r.appendChild(rv);
      div2.appendChild(r);div2.appendChild(makeBar(d.value,catLimit(c),d.color));
      if(c){Object.entries(spSub).forEach(([sid,sv])=>{
        const sc=sm[sid];if(!sc)return;
        const sr=h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"var(--muted)",paddingLeft:"26px",marginTop:"4px"}});
        sr.appendChild(h("span",{},[`↳ ${sc.name}`]));sr.appendChild(h("span",{},[fmt(sv)]));div2.appendChild(sr);
      });}
      catCard.appendChild(div2);
    });
    content.appendChild(catCard);

    // list
    const listCard=h("div",{class:"card",style:{marginBottom:"14px"}});
    listCard.appendChild(h("h3",{style:{fontSize:"13px",color:"var(--accent)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"14px"}},["Lançamentos"]));
    mExp.forEach(e=>{
      const card=STATE.cards.find(c=>c.id===e.cardId);
      const sub=sm[e.splits[0]?.subcatId];
      const r=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid var(--border)"}});
      const l=h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
      l.appendChild(h("span",{style:{fontSize:"16px"}},[sub?.cat?.icon||"💰"]));
      const li=h("div");li.appendChild(h("div",{style:{fontSize:"13px",fontWeight:"600"}},[e.description+(e._isInst?` (${e.currentInstallment}/${e.installments}x)`:"")]));li.appendChild(h("div",{style:{fontSize:"11px",color:"var(--muted)"}},[`${fmtDate(e.date)} · ${card?card.name:e.method==="debit"?"Débito":"Dinheiro"}`]));
      l.appendChild(li);r.appendChild(l);r.appendChild(h("span",{style:{fontWeight:"700",color:"var(--danger)",fontSize:"13px",flexShrink:"0",marginLeft:"8px"}},[fmt(e.total)]));listCard.appendChild(r);
    });
    if(mExp.length){const tr=h("div",{style:{display:"flex",justifyContent:"space-between",paddingTop:"12px",fontWeight:"700"}});tr.appendChild(h("span",{},["Total"]));tr.appendChild(h("span",{style:{color:"var(--danger)"}},[fmt(total)]));listCard.appendChild(tr);}
    content.appendChild(listCard);

    content.appendChild(h("button",{class:"btn btn-success btn-full",style:{marginBottom:"10px"},onClick:()=>window.print()},["🖨️ Imprimir"]));
    content.appendChild(h("button",{class:"btn btn-ghost btn-full",onClick:()=>openChangePassModal()},["🔑 Alterar Senha"]));
  };

  selMonth.addEventListener("change",()=>{selM=+selMonth.value;render();});
  selYear.addEventListener("change",()=>{selY=+selYear.value;render();});
  render();
}

// ── EXPENSE MODAL ─────────────────────────────────────────────────────────────
function openExpenseModal(expense=null){
  const editing=!!expense;
  const dc=defaultCard();
  openModal((box,close)=>{
    modalHead(box,editing?"Editar Gasto":"Novo Gasto",close);
    const body=h("div",{class:"modal-body"});
    const fDesc=h("input",{class:"inp",placeholder:"Ex: Supermercado",value:expense?.description||""});
    const fDate=h("input",{class:"inp",type:"date",value:expense?.date||today()});
    body.appendChild(h("div",{class:"field"},[h("label",{},["Descrição"]),fDesc]));
    body.appendChild(h("div",{class:"field"},[h("label",{},["Data"]),fDate]));

    // payment method
    body.appendChild(h("div",{class:"field"},[h("label",{},["Pagamento"])]));
    const methodGroup=h("div",{class:"toggle-group"});
    let method=expense?.method||"card";
    const methodBtns={};
    [["card","💳 Crédito"],["debit","🏦 Débito"],["cash","💵 Dinheiro"]].forEach(([v,l])=>{
      const btn=h("button",{class:`toggle-btn${method===v?" active":""}`,onClick:()=>{method=v;Object.entries(methodBtns).forEach(([k,b])=>b.classList.toggle("active",k===v));cardSection.style.display=v==="card"?"block":"none";}},[l]);
      methodBtns[v]=btn;methodGroup.appendChild(btn);
    });
    body.appendChild(methodGroup);

    // card section
    const cardSection=h("div",{style:{display:method==="card"?"block":"none",marginTop:"10px"}});
    const fCard=h("select",{class:"inp"});
    STATE.cards.forEach(c=>{const o=h("option",{value:c.id},[(c.isDefault?"⭐ ":"")+c.name]);if(c.id===(expense?.cardId||dc?.id))o.setAttribute("selected","");fCard.appendChild(o);});
    const fInst=h("input",{class:"inp",type:"number",min:"1",max:"48",value:String(expense?.installments||1)});
    fInst.addEventListener("focus",()=>fInst.select());
    const fCur=h("input",{class:"inp",type:"number",min:"1",value:String(expense?.currentInstallment||1)});
    fCur.addEventListener("focus",()=>fCur.select());
    cardSection.appendChild(h("div",{class:"field"},[h("label",{},["Cartão"]),fCard]));
    const instRow=h("div",{style:{display:"flex",gap:"12px"}});
    instRow.appendChild(h("div",{class:"field",style:{flex:"1"}},[h("label",{},["Parcelas"]),fInst]));
    instRow.appendChild(h("div",{class:"field",style:{flex:"1"}},[h("label",{},["Parcela atual"]),fCur]));
    cardSection.appendChild(instRow);
    body.appendChild(cardSection);

    // splits
    const splitsWrap=h("div");
    let splits=(expense?.splits||[{subcatId:"",amount:""}]).map(s=>({...s,amount:String(s.amount)}));

    const renderSplits=()=>{
      splitsWrap.innerHTML="";
      const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}});
      hdr.appendChild(h("label",{style:{color:"var(--muted)",fontSize:"11px",fontWeight:"700",letterSpacing:".8px",textTransform:"uppercase"}},["Categorias"]));
      hdr.appendChild(h("button",{class:"btn btn-ghost btn-sm",onClick:()=>{splits.push({subcatId:"",amount:""});renderSplits();}},["＋ Dividir"]));
      splitsWrap.appendChild(hdr);

      splits.forEach((s,i)=>{
        const row=h("div",{style:{marginBottom:"10px"}});
        const inputRow=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
        const sel=h("select",{class:"inp",style:{flex:"2"}});
        sel.appendChild(h("option",{value:""},["— Selecionar —"]));
        STATE.categories.forEach(c=>{
          const og=h("optgroup");og.label=`${c.icon} ${c.name}`;
          c.subcats.forEach(sc=>{const o=h("option",{value:sc.id},[`${sc.name} (${fmt(sc.limit)})`]);if(sc.id===s.subcatId)o.setAttribute("selected","");og.appendChild(o);});
          sel.appendChild(og);
        });
        sel.addEventListener("change",()=>{splits[i].subcatId=sel.value;});

        const amtWrap=h("div",{style:{flex:"1",display:"flex",gap:"4px"}});
        const amtInp=h("input",{class:"inp",type:"number",placeholder:"R$",value:s.amount,style:{flex:"1"}});
        amtInp.addEventListener("focus",()=>amtInp.select());
        amtInp.addEventListener("input",()=>{splits[i].amount=amtInp.value;updateTotal();});
        const calcBtn=h("button",{style:{background:"var(--accent-light)",border:"1px solid var(--accent)",borderRadius:"8px",padding:"0 8px",cursor:"pointer",color:"var(--accent)",fontSize:"14px",flexShrink:"0"}},["🔢"]);
        let calcOpen=false;
        const calcWrap=h("div",{style:{display:"none",marginTop:"8px"}});
        calcBtn.onclick=()=>{calcOpen=!calcOpen;calcWrap.style.display=calcOpen?"block":"none";if(calcOpen){calcWrap.innerHTML="";calcWrap.appendChild(makeCalculator(v=>{amtInp.value=String(v);splits[i].amount=String(v);updateTotal();calcOpen=false;calcWrap.style.display="none";}));}};
        amtWrap.appendChild(amtInp);amtWrap.appendChild(calcBtn);
        inputRow.appendChild(sel);inputRow.appendChild(amtWrap);
        if(splits.length>1){const del=h("button",{style:{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:"22px",lineHeight:"1",flexShrink:"0"},onClick:()=>{splits.splice(i,1);renderSplits();updateTotal();}},["×"]);inputRow.appendChild(del);}
        row.appendChild(inputRow);row.appendChild(calcWrap);splitsWrap.appendChild(row);
      });

      const total=splits.reduce((a,s)=>a+(parseFloat(s.amount)||0),0);
      if(total>0){
        const tot=h("div",{style:{background:"var(--accent-light)",borderRadius:"10px",padding:"8px 12px",display:"flex",justifyContent:"space-between"}});
        tot.appendChild(h("span",{style:{fontSize:"12px",color:"var(--accent)",fontWeight:"600"}},["Total"]));
        tot.appendChild(h("span",{style:{fontSize:"15px",fontWeight:"800",color:"var(--accent)"}},[fmt(total)]));
        splitsWrap.appendChild(tot);
      }
    };
    const updateTotal=()=>{const tot=splitsWrap.querySelector("div:last-child");if(tot)tot.remove();const total=splits.reduce((a,s)=>a+(parseFloat(s.amount)||0),0);if(total>0){const t=h("div",{style:{background:"var(--accent-light)",borderRadius:"10px",padding:"8px 12px",display:"flex",justifyContent:"space-between"}});t.appendChild(h("span",{style:{fontSize:"12px",color:"var(--accent)",fontWeight:"600"}},["Total"]));t.appendChild(h("span",{style:{fontSize:"15px",fontWeight:"800",color:"var(--accent)"}},[fmt(total)]));splitsWrap.appendChild(t);}};
    renderSplits();
    body.appendChild(splitsWrap);

    // save btn
    const errMsg=h("p",{style:{color:"var(--danger)",fontSize:"13px",marginBottom:"12px",textAlign:"center",display:"none"}});
    body.appendChild(errMsg);
    body.appendChild(h("button",{class:"btn btn-primary btn-full",style:{marginBottom:"8px"},onClick:()=>{
      const total=splits.reduce((a,s)=>a+(parseFloat(s.amount)||0),0);
      if(!fDesc.value){errMsg.textContent="Preencha a descrição.";errMsg.style.display="block";return;}
      if(total===0){errMsg.textContent="Adicione pelo menos um valor.";errMsg.style.display="block";return;}
      if(splits.some(s=>!s.subcatId)){errMsg.textContent="Selecione a categoria.";errMsg.style.display="block";return;}
      const exp={description:fDesc.value,date:fDate.value,total,method,cardId:method==="card"?fCard.value:null,installments:method==="card"?parseInt(fInst.value)||1:1,currentInstallment:method==="card"?parseInt(fCur.value)||1:1,splits:splits.map(s=>({subcatId:s.subcatId,amount:parseFloat(s.amount)||0}))};
      if(editing){const idx=STATE.expenses.findIndex(e=>e.id===expense.id);if(idx>=0)STATE.expenses[idx]={...STATE.expenses[idx],...exp};}
      else STATE.expenses.unshift({id:uid(),...exp});
      save();close();
    }},[(editing?"💾 Salvar Alterações":"✅ Registrar Gasto")]));
    body.appendChild(h("button",{class:"btn btn-ghost-muted btn-full",onClick:close},["Cancelar"]));
    box.appendChild(body);
  });
}

// ── CATEGORY MODAL ────────────────────────────────────────────────────────────
function openCategoryModal(cat=null){
  const editing=!!cat;
  openModal((box,close)=>{
    modalHead(box,editing?`Editar: ${cat.name}`:"Nova Categoria",close);
    const body=h("div",{class:"modal-body"});
    const EMOJIS=["🏠","🍽️","🚗","💊","📚","🎉","👗","📦","✈️","🐾","🔧","🎮","🛒","☕","🏋️","💡","🎓","🐶","🌿","🏖️"];
    let selIcon=cat?.icon||"📦";
    let cumulative=cat?.cumulative||false;
    let subcats=(cat?.subcats||[{id:uid(),name:"",limit:"",cumulative:false}]).map(s=>({...s,limit:String(s.limit)}));

    const fName=h("input",{class:"inp",placeholder:"Ex: Lazer",value:cat?.name||""});
    const fColor=h("input",{type:"color",class:"inp",style:{height:"46px",padding:"4px",cursor:"pointer"},value:cat?.color||"#4f46e5"});
    const nameRow=h("div",{style:{display:"flex",gap:"12px",marginBottom:"14px"}});
    nameRow.appendChild(h("div",{class:"field",style:{flex:"2",margin:"0"}},[h("label",{},["Nome"]),fName]));
    nameRow.appendChild(h("div",{class:"field",style:{flex:"1",margin:"0"}},[h("label",{},["Cor"]),fColor]));
    body.appendChild(nameRow);

    // icon
    body.appendChild(h("div",{class:"field"},[h("label",{},["Ícone"])]));
    const iconGrid=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"14px"}});
    const iconBtns={};
    EMOJIS.forEach(e=>{
      const btn=h("button",{style:{fontSize:"22px",background:selIcon===e?"var(--accent-light)":"none",border:`2px solid ${selIcon===e?"var(--accent)":"var(--border)"}`,borderRadius:"10px",padding:"5px",cursor:"pointer"},onClick:()=>{
        selIcon=e;
        Object.entries(iconBtns).forEach(([k,b])=>{b.style.background=k===e?"var(--accent-light)":"none";b.style.border=`2px solid ${k===e?"var(--accent)":"var(--border)"}`;});
      }},[e]);
      iconBtns[e]=btn;iconGrid.appendChild(btn);
    });
    body.appendChild(iconGrid);

    // type
    body.appendChild(h("div",{class:"field"},[h("label",{},["Tipo de limite"])]));
    const typeGroup=h("div",{class:"toggle-group",style:{marginBottom:"6px"}});
    const typeBtns={};
    [[false,"Mensal"],[true,"Acumula saldo"]].forEach(([v,l])=>{
      const btn=h("button",{class:`toggle-btn${cumulative===v?" active":""}`,onClick:()=>{cumulative=v;Object.entries(typeBtns).forEach(([k,b])=>b.classList.toggle("active",String(k)===String(v)));hintEl.textContent=v?"Saldo não usado passa pro próximo mês.":"Limite reseta todo mês.";}},[ l]);
      typeBtns[v]=btn;typeGroup.appendChild(btn);
    });
    body.appendChild(typeGroup);
    const hintEl=h("p",{style:{fontSize:"11px",color:"var(--muted)",marginBottom:"14px"}},[cumulative?"Saldo não usado passa pro próximo mês.":"Limite reseta todo mês."]);
    body.appendChild(hintEl);

    // auto limit display
    const autoLimitEl=h("div",{style:{display:"none",background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:"10px",padding:"10px 14px",marginBottom:"14px",display:"flex",justifyContent:"space-between",alignItems:"center"}});
    autoLimitEl.appendChild(h("span",{style:{fontSize:"13px",color:"#15803d",fontWeight:"600"}},["🔢 Limite total"]));
    const autoLimitVal=h("span",{style:{fontSize:"15px",fontWeight:"800",color:"#15803d"}});
    autoLimitEl.appendChild(autoLimitVal);
    body.appendChild(autoLimitEl);

    // subcats
    const subcatsWrap=h("div");
    const renderSubcats=()=>{
      subcatsWrap.innerHTML="";
      const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}});
      hdr.appendChild(h("label",{style:{color:"var(--muted)",fontSize:"11px",fontWeight:"700",letterSpacing:".8px",textTransform:"uppercase"}},["Subcategorias"]));
      hdr.appendChild(h("button",{class:"btn btn-ghost btn-sm",onClick:()=>{subcats.push({id:uid(),name:"",limit:"",cumulative:false});renderSubcats();}},["＋"]));
      subcatsWrap.appendChild(hdr);
      let total=0;
      subcats.forEach((s,i)=>{
        total+=parseFloat(s.limit)||0;
        const card2=h("div",{style:{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"12px",padding:"12px",marginBottom:"10px"}});
        const row=h("div",{style:{display:"flex",gap:"8px",marginBottom:"8px"}});
        const sName=h("input",{class:"inp",style:{flex:"2"},placeholder:"Nome",value:s.name});
        sName.addEventListener("input",()=>subcats[i].name=sName.value);
        const sLim=h("input",{class:"inp",style:{flex:"1"},type:"number",placeholder:"Limite",value:s.limit});
        sLim.addEventListener("input",()=>{subcats[i].limit=sLim.value;renderSubcats();});
        const del=h("button",{style:{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:"22px",lineHeight:"1",flexShrink:"0"},onClick:()=>{subcats.splice(i,1);renderSubcats();}},[" ×"]);
        row.appendChild(sName);row.appendChild(sLim);row.appendChild(del);card2.appendChild(row);
        const tg=h("div",{class:"toggle-group"});
        [[false,"Mensal"],[true,"Acumula"]].forEach(([v,l])=>{
          const btn=h("button",{class:`toggle-btn${s.cumulative===v?" active":""}`,onClick:()=>{subcats[i].cumulative=v;tg.querySelectorAll(".toggle-btn").forEach((b,bi)=>b.classList.toggle("active",bi===(v?1:0)));}},[ l]);
          tg.appendChild(btn);
        });
        card2.appendChild(tg);subcatsWrap.appendChild(card2);
      });
      autoLimitVal.textContent=fmt(total);
      autoLimitEl.style.display=total>0?"flex":"none";
    };
    renderSubcats();
    body.appendChild(subcatsWrap);

    const errMsg=h("p",{style:{color:"var(--danger)",fontSize:"13px",marginBottom:"12px",textAlign:"center",display:"none"}});
    body.appendChild(errMsg);
    body.appendChild(h("button",{class:"btn btn-primary btn-full",style:{marginBottom:"8px"},onClick:()=>{
      if(!fName.value){errMsg.textContent="Preencha o nome.";errMsg.style.display="block";return;}
      const data={name:fName.value,icon:selIcon,color:fColor.value,cumulative,subcats:subcats.filter(s=>s.name).map(s=>({id:s.id||uid(),name:s.name,limit:parseFloat(s.limit)||0,cumulative:s.cumulative||false}))};
      if(editing){const idx=STATE.categories.findIndex(c=>c.id===cat.id);if(idx>=0)STATE.categories[idx]={...STATE.categories[idx],...data};}
      else STATE.categories.push({id:uid(),...data});
      save();close();
    }},[(editing?"💾 Salvar Alterações":"✅ Criar Categoria")]));
    body.appendChild(h("button",{class:"btn btn-ghost-muted btn-full",onClick:close},["Cancelar"]));
    box.appendChild(body);
  },true);
}

// ── CARD MODAL ────────────────────────────────────────────────────────────────
function openCardModal(card=null){
  const editing=!!card;
  openModal((box,close)=>{
    modalHead(box,editing?`Editar: ${card.name}`:"Novo Cartão",close);
    const body=h("div",{class:"modal-body"});
    const fName=h("input",{class:"inp",style:{marginBottom:"14px"},placeholder:"Ex: Nubank",value:card?.name||""});
    body.appendChild(h("div",{class:"field"},[h("label",{},["Nome"]),fName]));
    const fRow=h("div",{style:{display:"flex",gap:"12px",marginBottom:"14px"}});
    const fFlag=h("select",{class:"inp",style:{flex:"2"}});
    ["Visa","Mastercard","Elo","American Express","Hipercard"].forEach(f=>{const o=h("option",{value:f},[f]);if(f===card?.flag)o.setAttribute("selected","");fFlag.appendChild(o);});
    const fColor=h("input",{type:"color",class:"inp",style:{flex:"1",height:"46px",padding:"4px",cursor:"pointer"},value:card?.color||"#4f46e5"});
    fRow.appendChild(h("div",{class:"field",style:{flex:"2",margin:"0"}},[h("label",{},["Bandeira"]),fFlag]));
    fRow.appendChild(h("div",{class:"field",style:{flex:"1",margin:"0"}},[h("label",{},["Cor"]),fColor]));
    body.appendChild(fRow);
    const fLimit=h("input",{class:"inp",type:"number",placeholder:"5000",value:card?.limit||""});
    body.appendChild(h("div",{class:"field"},[h("label",{},["Limite (R$)"]),fLimit]));
    const dRow=h("div",{style:{display:"flex",gap:"12px"}});
    const fClose=h("input",{class:"inp",type:"number",min:"1",max:"31",value:card?.closeDay||10});
    const fDue=h("input",{class:"inp",type:"number",min:"1",max:"31",value:card?.dueDay||17});
    dRow.appendChild(h("div",{class:"field",style:{flex:"1",margin:"0"}},[h("label",{},["Fechamento"]),fClose]));
    dRow.appendChild(h("div",{class:"field",style:{flex:"1",margin:"0"}},[h("label",{},["Vencimento"]),fDue]));
    body.appendChild(dRow);
    body.appendChild(h("div",{style:{marginBottom:"14px"}}));

    let isDefault=card?.isDefault||false;
    const defBtn=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",background:isDefault?"var(--accent-light)":"var(--bg)",border:`1px solid ${isDefault?"var(--accent)":"var(--border)"}`,borderRadius:"10px",cursor:"pointer",marginBottom:"14px"},onClick:()=>{
      isDefault=!isDefault;defBtn.style.background=isDefault?"var(--accent-light)":"var(--bg)";defBtn.style.border=`1px solid ${isDefault?"var(--accent)":"var(--border)"}`;
      defChk.textContent=isDefault?"✓":"";defTxt.style.color=isDefault?"var(--accent)":"var(--text)";
    }});
    const defChk=h("div",{style:{width:"22px",height:"22px",borderRadius:"6px",background:isDefault?"var(--accent)":"var(--surface)",border:`2px solid ${isDefault?"var(--accent)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"14px"}},[isDefault?"✓":""]);
    const defTxt=h("span",{style:{fontSize:"14px",fontWeight:"600",color:isDefault?"var(--accent)":"var(--text)"}},["⭐ Cartão principal (padrão na inserção)"]);
    defBtn.appendChild(defChk);defBtn.appendChild(defTxt);body.appendChild(defBtn);

    body.appendChild(h("button",{class:"btn btn-primary btn-full",style:{marginBottom:"8px"},onClick:()=>{
      if(!fName.value)return;
      let updated=STATE.cards;
      if(isDefault)updated=updated.map(c=>({...c,isDefault:false}));
      const data={name:fName.value,flag:fFlag.value,color:fColor.value,limit:parseFloat(fLimit.value)||0,closeDay:parseInt(fClose.value)||10,dueDay:parseInt(fDue.value)||17,isDefault};
      if(editing){const idx=updated.findIndex(c=>c.id===card.id);if(idx>=0)updated[idx]={...updated[idx],...data};}
      else updated.push({id:uid(),...data});
      STATE.cards=updated;save();close();
    }},[(editing?"💾 Salvar Alterações":"✅ Adicionar Cartão")]));
    body.appendChild(h("button",{class:"btn btn-ghost-muted btn-full",onClick:close},["Cancelar"]));
    box.appendChild(body);
  });
}

// ── CHANGE PASS MODAL ─────────────────────────────────────────────────────────
function openChangePassModal(){
  openModal((box,close)=>{
    modalHead(box,"Alterar Senha",close);
    const body=h("div",{class:"modal-body"});
    const fCur=h("input",{class:"inp",style:{marginBottom:"14px"},type:"password",placeholder:"Senha atual"});
    const fNew=h("input",{class:"inp",style:{marginBottom:"14px"},type:"password",placeholder:"Nova senha (mín. 4)"});
    const fConf=h("input",{class:"inp",style:{marginBottom:"14px"},type:"password",placeholder:"Confirmar nova senha"});
    const err=h("p",{style:{color:"var(--danger)",fontSize:"13px",marginBottom:"12px",textAlign:"center",display:"none"}});
    [h("div",{class:"field"},[h("label",{},["Senha atual"]),fCur]),h("div",{class:"field"},[h("label",{},["Nova senha"]),fNew]),h("div",{class:"field"},[h("label",{},["Confirmar"]),fConf]),err].forEach(e=>body.appendChild(e));
    body.appendChild(h("button",{class:"btn btn-primary btn-full",style:{marginBottom:"8px"},onClick:()=>{
      if(fCur.value!==LS.get("fin:pass",DEFAULT_PASS)){err.textContent="Senha atual incorreta.";err.style.display="block";return;}
      if(fNew.value.length<4){err.textContent="Mínimo 4 caracteres.";err.style.display="block";return;}
      if(fNew.value!==fConf.value){err.textContent="Senhas não coincidem.";err.style.display="block";return;}
      LS.set("fin:pass",fNew.value);
      body.innerHTML="<div style='text-align:center;padding:20px 0'><div style='font-size:40px;margin-bottom:10px'>✅</div><div style='font-weight:700;font-size:16px;margin-bottom:16px'>Senha alterada!</div></div>";
      body.appendChild(h("button",{class:"btn btn-primary btn-full",onClick:close},["Fechar"]));
    }},["🔑 Alterar"]));
    body.appendChild(h("button",{class:"btn btn-ghost-muted btn-full",onClick:close},["Cancelar"]));
    box.appendChild(body);
  });
}
